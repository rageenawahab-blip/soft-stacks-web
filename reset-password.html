<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Password | Soft Stacks</title>
    <link rel="stylesheet" href="reset-password.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>Create New <span class="highlight">Password</span></h2>
            <form id="resetForm">
                <input type="password" id="newPassword" placeholder="New Password" required minlength="6">
                <input type="password" id="confirmPassword" placeholder="Confirm New Password" required>
                <button type="submit" class="login-btn">Update Password</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (password !== confirm) {
                return alert("Passwords do not match!");
            }

            // This part gets the ?token=... from your email link
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            const response = await fetch(`/api/auth/reset-password/${token}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });

            const data = await response.json();
            if (response.ok) {
                alert("Password Updated! You can now login.");
                window.location.href = "index.html";
            } else {
                alert(data.message);
            }
        });
    </script>
</body>
</html>

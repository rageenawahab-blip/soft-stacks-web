<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password | Soft Stacks</title>
    <link rel="stylesheet" href="forgot-password.css"> </head>
<body>
  <div class="login-container">
    <div class="login-box" id="formContent">
        <div id="requestState">
            <h2>Reset <span class="highlight">Password</span></h2>
            <p>Enter your registered email to receive a reset link.</p>
            <form id="forgotForm">
                <div class="input-group">
                    <input type="email" id="resetEmail" placeholder="Enter your Gmail" required>
                </div>
                <button type="submit" class="login-btn" id="submitBtn">Send Reset Link</button>
                <a href="index.html" class="back-link">Back to Login</a>
            </form>
        </div>

        <div id="successState" style="display: none;">
            <div style="font-size: 50px; margin-bottom: 20px;">📧</div>
            <h2 class="highlight">Link Sent!</h2>
            <p>We've sent a password reset link to your email. Please check your inbox and spam folder.</p>
            <button onclick="window.location.reload()" class="login-btn">Try Again</button>
            <a href="index.html" class="back-link">Back to Login</a>
        </div>
    </div>
</div>

<script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('resetEmail').value;
        const btn = document.getElementById('submitBtn');

        // Change button text to show loading
        btn.innerText = "Sending...";
        btn.disabled = true;

        try {
            const response = await fetch('/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            const data = await response.json();

            if (response.ok) {
                // Hide the form and show the success message
                document.getElementById('requestState').style.display = 'none';
                document.getElementById('successState').style.display = 'block';
            } else {
                alert(data.message || "Something went wrong");
                btn.innerText = "Send Reset Link";
                btn.disabled = false;
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Could not connect to the server.");
            btn.innerText = "Send Reset Link";
            btn.disabled = false;
        }
    });
</script>
</body>
</html>

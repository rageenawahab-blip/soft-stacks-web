<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | DevAcademy</title>
    <link rel="stylesheet" href="login-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h2>Admin <span>Access</span></h2>
                <p>Enter your credentials to manage the portal</p>
            </div>

           <form id="adminLoginForm"> 
    <div class="input-group">
        <label for="username">Email</label>
        <input type="email" id="username" placeholder="rageenawahab@gmail.com" required>
    </div>

    <div class="input-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
            <input type="password" id="password" placeholder="••••••••" required>
            <button type="button" id="togglePassword" class="toggle-btn">Show</button>
        </div>
    </div>

    <div class="options">
        <label><input type="checkbox"> Remember me</label>
        <a href="forget-Password.html">Forgot Password?</a>
    </div>

    <button type="submit" class="login-btn">Secure Login</button>
</form>

            <div class="login-footer">
                <a href="index.html">← Back to Website</a>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
